<svg width="1280" height="320" viewBox="0 0 1280 320"
     xmlns="http://www.w3.org/2000/svg">

    <defs>

        <!-- Animated Gradient -->
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#6426A5">
                <animate attributeName="stop-color"
                    values="#6426A5;#7B2CBF;#6426A5"
                    dur="10s"
                    repeatCount="indefinite"/>
            </stop>

            <stop offset="50%" stop-color="#B83280">
                <animate attributeName="stop-color"
                    values="#B83280;#D53F8C;#B83280"
                    dur="10s"
                    repeatCount="indefinite"/>
            </stop>

            <stop offset="100%" stop-color="#D97706">
                <animate attributeName="stop-color"
                    values="#D97706;#F59E0B;#D97706"
                    dur="10s"
                    repeatCount="indefinite"/>
            </stop>
        </linearGradient>

        <filter id="shadow">
            <feDropShadow dx="0" dy="6" stdDeviation="8"
                          flood-opacity="0.35"/>
        </filter>

    </defs>

    <!-- Background -->
    <rect width="1280" height="320" fill="url(#bg)"/>

    <!-- Back Wave -->
    <path fill="#00000025">

        <animate attributeName="d"
        dur="8s"
        repeatCount="indefinite"

        values="
M0 240 C220 300 420 180 640 220 C860 260 1080 160 1280 220 L1280 320 L0 320 Z;

M0 220 C220 140 420 290 640 210 C860 130 1080 280 1280 210 L1280 320 L0 320 Z;

M0 240 C220 300 420 180 640 220 C860 260 1080 160 1280 220 L1280 320 L0 320 Z"/>
    </path>

    <!-- Front Wave -->
    <path fill="#00000045">

        <animate attributeName="d"
        dur="5s"
        repeatCount="indefinite"

        values="
M0 260 C180 330 360 160 640 250 C900 330 1080 160 1280 250 L1280 320 L0 320 Z;

M0 250 C180 150 360 320 640 240 C900 160 1080 320 1280 240 L1280 320 L0 320 Z;

M0 260 C180 330 360 160 640 250 C900 330 1080 160 1280 250 L1280 320 L0 320 Z"/>
    </path>

    <!-- Title -->
    <text
        x="640"
        y="135"
        text-anchor="middle"
        font-size="72"
        font-family="Segoe UI, Arial, sans-serif"
        font-weight="700"
        fill="white"
        filter="url(#shadow)">
        Abhinav Verma
    </text>

    <!-- Subtitle -->
    <text
        x="640"
        y="195"
        text-anchor="middle"
        font-size="28"
        font-family="Segoe UI, Arial, sans-serif"
        fill="white"
        opacity="0.95">
        AI Engineer
    </text>

</svg>
